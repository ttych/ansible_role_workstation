---

want_workstation_github_act: yes

# workstation_github_act_version:

workstation_github_act_name: act
workstation_github_act_github_repo: nektos/act
workstation_github_act_github_api_url: "https://api.github.com/repos/{{ workstation_github_act_github_repo }}/releases/latest"
workstation_github_act_github_download_url: "https://github.com/{{ workstation_github_act_github_repo }}/releases/download/v{{ workstation_github_act_version }}/{{ workstation_github_act_name }}_{{ ansible_facts.system }}_{{ ansible_facts.architecture }}.tar.gz"

workstation_github_act_local_dir: "{{ workstation_local_dir }}"
workstation_github_act_local_bin_dir: "{{ workstation_github_act_local_dir }}/bin"
workstation_github_act_local_bin: "{{ workstation_github_act_local_bin_dir }}/{{ workstation_github_act_name }}"
