---

want_workstation_shellcheck: yes

# workstation_shellcheck_version:

workstation_shellcheck_name: shellcheck
workstation_shellcheck_github_repo: koalaman/shellcheck
workstation_shellcheck_github_api_url: "https://api.github.com/repos/{{ workstation_shellcheck_github_repo }}/releases/latest"
workstation_shellcheck_github_download_url: "https://github.com/{{ workstation_shellcheck_github_repo }}/releases/latest/download/{{ workstation_shellcheck_name }}-v{{ workstation_shellcheck_version }}.{{ ansible_facts.system | lower }}.{{ ansible_facts.architecture }}.tar.xz"
workstation_shellcheck_local_dir: "{{ workstation_local_dir }}"
workstation_shellcheck_local_bin_dir: "{{ workstation_shellcheck_local_dir }}/bin"
workstation_shellcheck_local_bin: "{{ workstation_shellcheck_local_bin_dir }}/{{ workstation_shellcheck_name }}"
