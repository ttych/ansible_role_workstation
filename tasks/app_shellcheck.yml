---

- block:

    - name: check current shellcheck
      ansible.builtin.stat:
        path: "{{ workstation_shellcheck_local_bin }}"
      register: t_workstation_shellcheck_local_bin

    - block:

        - name: get latest shellcheck version from GitHub API
          ansible.builtin.uri:
            url: "{{ workstation_shellcheck_github_api_url }}"
            return_content: yes
          register: t_workstation_shellcheck_github_latest_release
          changed_when: no

        - name: extract latest shellcheck version
          ansible.builtin.set_fact:
            workstation_shellcheck_version: "{{ (t_workstation_shellcheck_github_latest_release.content | from_json).tag_name | replace('v', '') }}"

      when: workstation_shellcheck_version is not defined or workstation_shellcheck_version == ""

    - block:

        - name: get current shellcheck version
          ansible.builtin.shell:
            cmd: "{{ workstation_shellcheck_local_bin }} -V | sed -n 's/^version: \\([0-9.]*\\)/\\1/p'"
          register: t_workstation_shellcheck_current_version
          changed_when: no

      when: t_workstation_shellcheck_local_bin.stat.exists

    # - debug:
    #     msg: "latest:{{ workstation_shellcheck_version }}  -  current:{{ t_workstation_shellcheck_current_version.stdout | d('') }}"

    - block:

        - name: download shellcheck archive
          ansible.builtin.get_url:
            url: "{{ workstation_shellcheck_github_download_url }}"
            dest: "{{ workstation_tmp_dir }}/shellcheck.tar.xz"
            mode: '0644'

        - name: extract shellcheck archive
          ansible.builtin.unarchive:
            src: "{{ workstation_tmp_dir }}/shellcheck.tar.xz"
            dest: "{{ workstation_tmp_dir }}"
            remote_src: yes
            creates: "{{ workstation_tmp_dir }}/{{ workstation_shellcheck_name }}"

        - name: "install shellcheck binary to {{ workstation_shellcheck_local_bin }}"
          ansible.builtin.copy:
            src: "{{ workstation_tmp_dir }}/{{ workstation_shellcheck_name }}-v{{ workstation_shellcheck_version }}/{{ workstation_shellcheck_name }}"
            dest: "{{ workstation_shellcheck_local_bin }}"
            mode: '0755'
            owner: root
            group: root
            remote_src: yes

        - name: clean up temporary files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ workstation_tmp_dir }}/shellcheck.tar.xz"
            - "{{ workstation_tmp_dir }}/{{ workstation_shellcheck_name }}-v{{ workstation_shellcheck_version }}"

      when: not t_workstation_shellcheck_local_bin.stat.exists or (t_workstation_shellcheck_current_version is defined and t_workstation_shellcheck_current_version.stdout != workstation_shellcheck_version)

  when: want_workstation_shellcheck
