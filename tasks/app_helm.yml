---

- block:

    - name: check current helm
      ansible.builtin.stat:
        path: "{{ workstation_helm_local_bin }}"
      register: t_workstation_helm_local_bin

    - block:

        - name: get latest helm version from GitHub API
          ansible.builtin.uri:
            url: "{{ workstation_helm_github_api_url }}"
            return_content: yes
          register: t_workstation_helm_github_latest_release
          changed_when: no

        - name: extract latest helm version
          ansible.builtin.set_fact:
            workstation_helm_version: "{{ (t_workstation_helm_github_latest_release.content | from_json).tag_name | replace('v', '') }}"

      when: workstation_helm_version is not defined or workstation_helm_version == ""

    - block:

        - name: get current helm version
          ansible.builtin.shell:
            cmd: "{{ workstation_helm_local_bin }} version | sed -e 's/^.*\\bVersion:\"v\\([0-9.]*\\)\".*/\\1/g'"
          register: t_workstation_helm_current_version
          changed_when: no

      when: t_workstation_helm_local_bin.stat.exists

    # - debug:
    #     msg: "latest:{{ workstation_helm_version }}  -  current:{{ t_workstation_helm_current_version.stdout | d('') }}"

    - block:

        - name: download helm archive
          ansible.builtin.get_url:
            url: "{{ workstation_helm_github_download_url }}"
            dest: "{{ workstation_tmp_dir }}/helm.tar.gz"
            mode: '0644'

        - name: extract helm archive
          ansible.builtin.unarchive:
            src: "{{ workstation_tmp_dir }}/helm.tar.gz"
            dest: "{{ workstation_tmp_dir }}"
            remote_src: yes
            creates: "{{ workstation_tmp_dir }}/{{ workstation_helm_name }}"

        - name: "install helm binary to {{ workstation_helm_local_bin }}"
          ansible.builtin.copy:
            src: "{{ workstation_tmp_dir }}/{{ ansible_facts.system | lower }}-{{ workstation_architecture_alt[ansible_facts.architecture] }}/{{ workstation_helm_name }}"
            dest: "{{ workstation_helm_local_bin }}"
            mode: '0755'
            owner: root
            group: root
            remote_src: yes

        - name: clean up temporary files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ workstation_tmp_dir }}/helm.tar.gz"
            - "{{ workstation_tmp_dir }}/{{ workstation_helm_name }}"
            - "{{ workstation_tmp_dir }}/{{ ansible_facts.system | lower }}-{{ workstation_architecture_alt[ansible_facts.architecture] }}"
            - "{{ workstation_tmp_dir }}/README.md"
            - "{{ workstation_tmp_dir }}/CHANGELOG.md"
            - "{{ workstation_tmp_dir }}/LICENSE"

      when: not t_workstation_helm_local_bin.stat.exists or (t_workstation_helm_current_version is defined and t_workstation_helm_current_version.stdout != workstation_helm_version)

  when: want_workstation_helm
